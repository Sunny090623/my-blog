<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 · 小电视の日常</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #ffe9f0, #ffd9e5);
            min-height: 100vh;
            padding: 2rem;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(251, 114, 153, 0.3);
            box-shadow: 0 12px 28px rgba(251, 114, 153, 0.1);
        }
        h2 {
            color: #FB7299;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            border-bottom: 2px solid #FB7299;
            padding-bottom: 0.5rem;
        }
        .post-list {
            list-style: none;
            max-height: 600px;
            overflow-y: auto;
        }
        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid rgba(251, 114, 153, 0.2);
            cursor: pointer;
            transition: background 0.2s;
        }
        .post-item:hover {
            background: rgba(251, 114, 153, 0.1);
        }
        .post-item .title {
            font-weight: 600;
            color: #2a2a2a;
        }
        .post-item .slug {
            color: #666;
            font-size: 0.9rem;
            margin-left: 1rem;
        }
        .post-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(251, 114, 153, 0.3);
        }
        .btn:hover {
            background: #FB7299;
            color: white;
        }
        .btn-danger {
            background: rgba(255, 100, 100, 0.2);
            border-color: #ff4d4f;
        }
        .btn-danger:hover {
            background: #ff4d4f;
            color: white;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2a2a2a;
            font-weight: 500;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid rgba(251, 114, 153, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .form-row {
            display: flex;
            gap: 1rem;
        }
        .form-row .form-group {
            flex: 1;
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: rgba(0, 200, 0, 0.2);
            border: 1px solid #00a800;
            color: #006400;
        }
        .message.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #a80000;
        }
        /* 在 <style> 中添加 */
        .admin-container {
            min-height: 100vh; /* 确保面板有高度参考 */
        }
        .left-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .left-panel .post-list {
            flex: 1;
            overflow-y: auto;
        }
        .logout-container {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(251,114,153,0.3);
        }

    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 左侧：文章列表 -->
        <div class="panel left-panel">
            <h2><i class="fas fa-list"></i> 文章列表</h2>
            <div class="post-list" id="post-list">
                <!-- 动态加载的文章列表 -->
            </div>
            <div class="logout-container" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(251,114,153,0.3);">
                <button id="logoutBtnLeft" class="btn" style="width: 100%; background: rgba(255,255,255,0.3); border: 1px solid #FB7299;">
                    <i class="fas fa-sign-out-alt"></i> 注销
                </button>
            </div>
        </div>

        <!-- 右侧：编辑表单 -->
        <div class="panel">
            <h2><i class="fas fa-edit"></i> 编辑文章</h2>
            <form id="post-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Slug (唯一标识)</label>
                        <input type="text" id="slug" name="slug" placeholder="例如 my-first-post" required>
                    </div>
                    <div class="form-group">
                        <label>标签 (逗号分隔)</label>
                        <input type="text" id="tags" name="tags" placeholder="教程,Cloudflare,前端">
                    </div>
                </div>
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="title" name="title" placeholder="文章标题" required>
                </div>
                <div class="form-group">
                    <label>摘要</label>
                    <textarea id="excerpt" name="excerpt" placeholder="简短介绍..."></textarea>
                </div>
                <div class="form-group">
                    <label>正文 (支持 HTML)</label>
                    <textarea id="content" name="content" placeholder="<p>文章内容...</p>"></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn" style="flex: 2;">保存文章</button>
                    <button type="button" class="btn" id="clear-btn" style="flex: 1;">清空表单</button>
                </div>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>

    <script>
        // DOM 元素
        const postList = document.getElementById('post-list');
        const form = document.getElementById('post-form');
        const slugInput = document.getElementById('slug');
        const titleInput = document.getElementById('title');
        const contentInput = document.getElementById('content');
        const excerptInput = document.getElementById('excerpt');
        const tagsInput = document.getElementById('tags');
        const messageDiv = document.getElementById('message');
        const clearBtn = document.getElementById('clear-btn');

        // 显示消息
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        // 加载文章列表
        async function loadPosts() {
            try {
                const response = await fetch('/api/posts');
                const posts = await response.json();
                
                if (posts.length === 0) {
                    postList.innerHTML = '<p style="text-align: center;">暂无文章，点击右上角新增</p>';
                    return;
                }

                let html = '';
                posts.forEach(post => {
                    html += `
                        <div class="post-item">
                            <div style="flex: 1;" onclick="editPost('${post.slug}')">
                                <span class="title">${post.title}</span>
                                <span class="slug">(${post.slug})</span>
                            </div>
                            <div class="post-actions">
                                <button class="btn" onclick="editPost('${post.slug}')">编辑</button>
                                <button class="btn btn-danger" onclick="deletePost('${post.slug}')">删除</button>
                            </div>
                        </div>
                    `;
                });
                postList.innerHTML = html;
            } catch (error) {
                postList.innerHTML = '<p style="color: red;">加载失败</p>';
            }
        }

        // 编辑文章：填充表单
        window.editPost = async function(slug) {
            try {
                const response = await fetch(`/api/post/${slug}`);
                const post = await response.json();
                
                slugInput.value = post.slug;
                titleInput.value = post.title;
                contentInput.value = post.content || '';
                excerptInput.value = post.excerpt || '';
                tagsInput.value = post.tags || '';
                
                showMessage('已加载文章', 'success');
            } catch (error) {
                showMessage('加载失败', 'error');
            }
        };

        // 删除文章
        window.deletePost = async function(slug) {
            if (!confirm(`确定要删除文章 "${slug}" 吗？`)) return;
            
            const formData = new FormData();
            formData.append('slug', slug);

            try {
                const response = await fetch('/api/admin/post/delete', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    showMessage('删除成功', 'success');
                    loadPosts();  // 刷新列表
                    if (slugInput.value === slug) {
                        clearForm();  // 如果当前编辑的是被删除的文章，清空表单
                    }
                } else {
                    showMessage(result.error || '删除失败', 'error');
                }
            } catch (error) {
                showMessage('删除失败', 'error');
            }
        };

        // 清空表单
        function clearForm() {
            slugInput.value = '';
            titleInput.value = '';
            contentInput.value = '';
            excerptInput.value = '';
            tagsInput.value = '';
        }
        clearBtn.addEventListener('click', clearForm);

        // 提交表单（新增/更新）
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            
            try {
                const response = await fetch('/api/admin/post', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    showMessage('保存成功', 'success');
                    loadPosts();  // 刷新列表
                } else {
                    showMessage(result.error || '保存失败', 'error');
                }
            } catch (error) {
                showMessage('保存失败', 'error');
            }
        });

        // 初始加载
        loadPosts();
    </script>
</body>
</html>
