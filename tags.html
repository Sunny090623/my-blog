<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签云 · 小电视の日常</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <style>
        /* 标签云额外样式 */
        .search-box {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
        }

        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 0.8rem 1.5rem;
            border: 1px solid rgba(251, 114, 153, 0.3);
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #FB7299;
            box-shadow: 0 0 0 3px rgba(251, 114, 153, 0.2);
        }

        .tags-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .tag-item {
            background: rgba(251, 114, 153, 0.1);
            border: 1px solid #FB7299;
            border-radius: 30px;
            padding: 0.5rem 1.2rem;
            font-size: 1rem;
            color: #FB7299;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-block;
        }

        .tag-item:hover {
            background: #FB7299;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(251, 114, 153, 0.3);
        }

        .tag-count {
            margin-left: 0.3rem;
            font-size: 0.8rem;
            color: inherit;
            opacity: 0.8;
        }

        .no-tags {
            text-align: center;
            color: #666;
            padding: 2rem;
        }

        @media (max-width: 768px) {
            .tags-cloud {
                padding: 1.5rem;
                gap: 0.5rem;
            }

            .tag-item {
                font-size: 0.9rem;
                padding: 0.4rem 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="blog-container">

        <!-- 二级页面组件化导航栏 -->
        <blog-navbar-secondary></blog-navbar-secondary>

        <!-- 全局侧边栏组件 -->
        <blog-sidebar></blog-sidebar>

        <h2 class="section-title"><i class="fas fa-tags" style="color:#FB7299; margin-right:12px;"></i>标签云</h2>

        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="tagSearch" placeholder="🔍 搜索标签..." autofocus>
        </div>

        <!-- 标签云容器 -->
        <div id="tags-cloud" class="tags-cloud">
            <p class="no-tags">加载中...</p>
        </div>

        <!-- 页脚（复制 index.html 的页脚） -->
        <footer class="footer glass">
            <div class="copyright">
                <i class="fas fa-copyright"></i> 2025 小电视の日常 · 粉系毛玻璃博客
                <i class="fas fa-heart" style="color: #FB7299;"></i>
            </div>
        </footer>
    </div>

    <script>
        let allTags = []; // 存储所有标签

        async function loadTags() {
            try {
                const res = await fetch('/api/tags');
                allTags = await res.json();
                renderTags(allTags);
            } catch (err) {
                console.error('加载标签失败:', err);
                document.getElementById('tags-cloud').innerHTML = '<p class="no-tags">加载失败</p>';
            }
        }

        function renderTags(tags) {
            const container = document.getElementById('tags-cloud');
            if (!tags || tags.length === 0) {
                container.innerHTML = '<p class="no-tags">暂无标签</p>';
                return;
            }
            let html = '';
            tags.forEach(tag => {
                html += `<a href="tag.html?name=${encodeURIComponent(tag.name)}" class="tag-item">#${tag.name}<span class="tag-count">(${tag.count})</span></a>`;
            });
            container.innerHTML = html;
        }

        // 搜索过滤（模糊匹配）
        document.getElementById('tagSearch').addEventListener('input', (e) => {
            const keyword = e.target.value.trim().toLowerCase();
            if (!keyword) {
                renderTags(allTags);
                return;
            }
            const filtered = allTags.filter(tag => tag.name.toLowerCase().includes(keyword));
            renderTags(filtered);
        });

        loadTags();
    </script>
</body>

</html>
