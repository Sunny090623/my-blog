<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 · 小电视の日常</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #ffe9f0, #ffd9e5);
            min-height: 100vh;
            padding: 2rem;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(251, 114, 153, 0.3);
            box-shadow: 0 12px 28px rgba(251, 114, 153, 0.1);
        }
        h2 {
            color: #FB7299;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            border-bottom: 2px solid #FB7299;
            padding-bottom: 0.5rem;
        }
        .post-list {
            list-style: none;
            max-height: 600px;
            overflow-y: auto;
        }
        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid rgba(251, 114, 153, 0.2);
            cursor: pointer;
            transition: background 0.2s;
        }
        .post-item:hover {
            background: rgba(251, 114, 153, 0.1);
        }
        .post-item .title {
            font-weight: 600;
            color: #2a2a2a;
        }
        .post-item .slug {
            color: #666;
            font-size: 0.9rem;
            margin-left: 1rem;
        }
        .post-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(251, 114, 153, 0.3);
        }
        .btn:hover {
            background: #FB7299;
            color: white;
        }
        .btn-danger {
            background: rgba(255, 100, 100, 0.2);
            border-color: #ff4d4f;
        }
        .btn-danger:hover {
            background: #ff4d4f;
            color: white;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2a2a2a;
            font-weight: 500;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid rgba(251, 114, 153, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .form-row {
            display: flex;
            gap: 1rem;
        }
        .form-row .form-group {
            flex: 1;
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: rgba(0, 200, 0, 0.2);
            border: 1px solid #00a800;
            color: #006400;
        }
        .message.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #a80000;
        }
        /* 在 <style> 中添加 */
        .admin-container {
            min-height: 100vh; /* 确保面板有高度参考 */
        }
        .left-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .left-panel .post-list {
            flex: 1;
            overflow-y: auto;
        }
        .logout-container {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(251,114,153,0.3);
        }
        /* 欢迎语样式 */
        .welcome-message {
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
            background: rgba(251,114,153,0.15);
            border-radius: 24px;
            font-size: 1.3rem;
            color: #FB7299;
            border: 1px solid rgba(251,114,153,0.3);
        }
        .welcome-message i {
            margin-right: 0.5rem;
        }
        #username {
            font-weight: 600;
            color: #FB7299;
        }

        /* 三个按钮并排等宽 */
        .action-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }
        .action-buttons .btn,
        .action-buttons label.btn {
            flex: 1;                /* 等宽 */
            min-width: 0;           /* 防止内容撑开 */
            padding: 0.6rem 0.3rem; /* 稍作调整 */
            font-size: 1rem;
            margin: 0;
            box-sizing: border-box;
        }
        .slug-readonly {
            background: rgba(200,200,200,0.2);
            cursor: not-allowed;
            color: #666;
        }
        .btn-user {
            background: rgba(251,114,153,0.15);
            border: 1px dashed #FB7299;
            color: #FB7299;
            text-decoration: none;
        }
        .btn-user:hover {
            background: #FB7299;
            color: white;
            border-color: #FB7299;
            text-decoration: none;
        }
        .suggested-tag {
            background: rgba(251,114,153,0.1);
            border: 1px solid #FB7299;
            color: #FB7299;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-block;
        }
        .suggested-tag:hover {
            background: rgba(251,114,153,0.2);
        }
        .suggested-tag.selected {
            background: #FB7299;
            color: white;
        }
        .action-buttons {
            display: flex;
            gap: 0.8rem;
        }
        .action-buttons .btn {
            flex: 1;  /* 默认所有按钮等宽 */
        }

/* 手机端适配 */
@media (max-width: 768px) {
    .admin-container {
        grid-template-columns: 1fr;  /* 改为单列 */
        gap: 1rem;
        padding: 1rem;
    }

    .panel {
        padding: 1.5rem;  /* 适当缩小内边距 */
    }

    h2 {
        font-size: 1.5rem;  /* 标题稍微缩小 */
    }

    .post-item {
        padding: 1rem;  /* 增大列表项的点击区域 */
        font-size: 1rem;
    }

    .post-item .slug {
        font-size: 0.8rem;  /* 小屏下slug字号再小一点 */
    }

    .post-actions .btn {
        padding: 0.5rem 0.8rem;  /* 按钮大小调整 */
        font-size: 0.9rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
        padding: 0.7rem;  /* 输入框稍微紧凑 */
        font-size: 1rem;
    }

    .form-row {
        flex-direction: column;  /* 如果表单中有并排字段，改为上下排列 */
        gap: 0.5rem;
    }

    .logout-container {
        margin-top: 0.8rem;
        padding-top: 0.8rem;
    }

    #logoutBtnLeft {
        padding: 0.8rem;  /* 注销按钮更大，方便点击 */
    }
    /* 按钮组在窄屏时稍微缩小内边距，保证一行显示 */
    .action-buttons .btn,
    .action-buttons label.btn {
        padding: 0.5rem 0.2rem;
        font-size: 0.9rem;
            }
    /* 超窄屏（如折叠屏）允许换行 */
        @media (max-width: 400px) {
            .action-buttons {
                flex-wrap: wrap;
            }
            .action-buttons .btn,
            .action-buttons label.btn {
                flex: 1 1 100%;   /* 换行后占满宽度 */
            }
        }

    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 左侧：文章列表 -->
        <div class="panel left-panel">
            <!-- 左侧面板标题行 -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem;">
                <h2 style="margin-bottom: 0;"><i class="fas fa-list"></i> 文章列表</h2>
                <a href="/users.html" class="btn btn-user" id="userManagementBtn" style="display: none;">
                    <i class="fas fa-users"></i> 用户管理
                </a>
            </div>

            <!-- 作者问候语 -->
            <div class="welcome-message glass">
                <i class="fas fa-user-circle"></i> 你好，<span id="username">加载中...</span>！
            </div>
            <div class="post-list">
                <h3 style="color:#FB7299; margin-bottom:0.5rem;">📄 已发表</h3>
                <div id="published-posts" style="margin-bottom:1.5rem;"></div>
                <h3 style="color:#FB7299; margin-bottom:0.5rem;">📝 草稿箱</h3>
                <div id="draft-posts"></div>
            </div>
            <div class="logout-container" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(251,114,153,0.3);">
                <button id="logoutBtnLeft" class="btn" style="width: 100%; background: rgba(255,255,255,0.3); border: 1px solid #FB7299;">
                    <i class="fas fa-sign-out-alt"></i> 注销
                </button>
            </div>
        </div>

        <!-- 右侧：编辑表单 -->
        <div class="panel">
                <h2 style="margin-bottom: 1.5;"><i class="fas fa-edit"></i> 编辑文章</h2>
            <form id="post-form">
                <div class="form-row">
                    <!-- 隐藏的 slug 字段，用于表单提交 -->
                    <input type="hidden" id="slug" name="slug" value="">
                    <!-- 只读显示框，让用户看到生成的 slug -->
                    <div class="form-group" style="flex: 1;">
                        <label>文章标识</label>
                        <input type="text" id="slug_display" class="slug-readonly" readonly placeholder="保存后自动生成" value="">
                    </div>
                    <!-- 标签输入框 -->
                    <div class="form-group">
                        <label>标签 (逗号分隔)</label>
                        <input type="text" id="tags" name="tags" placeholder="教程,Cloudflare,前端" style="width: 100%;">
                    </div>

                    <!-- 新增：推荐标签区域 -->
                    <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
                        <button type="button" id="suggestTagsBtn" class="btn">✨ 推荐</button>
                        <div id="suggested-tags" style="display: flex; flex-wrap: wrap; gap: 0.5rem; flex: 1;"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="title" name="title" placeholder="文章标题" required>
                </div>
                <div class="form-group">
                    <label>摘要</label>
                    <textarea id="excerpt" name="excerpt" placeholder="简短介绍..."></textarea>
                </div>
                <div class="form-group">
                    <label>正文 (支持Markdown / HTML)</label>
                    <textarea id="content" name="content" placeholder="<p>文章内容...</p>"></textarea>
                </div>
                <!-- 三个按钮并排等宽，放在表单底部 -->
                <div class="action-buttons">
                    <button type="button" id="newPostBtn" class="btn">新建</button>
                    <label for="uploadMd" class="btn">上传</label>
                    <input type="file" id="uploadMd" accept=".md, .markdown, text/markdown" style="display: none;">
                    <button type="button" id="saveDraftBtn" class="btn">保存</button>
                    <button type="button" id="publishBtn" class="btn">发表</button>
                </div>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>

  <script>
    // ==================== 全局变量 ====================
    const postList = document.getElementById('post-list'); // 文章列表容器（实际会被两个子容器替代，但保留用于兼容）
    const publishedContainer = document.getElementById('published-posts'); // 已发表文章容器
    const draftContainer = document.getElementById('draft-posts'); // 草稿箱容器
    const form = document.getElementById('post-form'); // 编辑表单
    const slugHidden = document.getElementById('slug'); // 隐藏的slug字段
    const slugDisplay = document.getElementById('slug_display'); // 只读显示的slug
    const titleInput = document.getElementById('title');
    const contentInput = document.getElementById('content');
    const excerptInput = document.getElementById('excerpt');
    const tagsInput = document.getElementById('tags');
    const messageDiv = document.getElementById('message');
    const usernameSpan = document.getElementById('username');
    const newPostBtn = document.getElementById('newPostBtn');
    const uploadMd = document.getElementById('uploadMd');
    const saveDraftBtn = document.getElementById('saveDraftBtn');
    const publishBtn = document.getElementById('publishBtn');
    const logoutBtn = document.getElementById('logoutBtnLeft');
    const userManagementBtn = document.getElementById('userManagementBtn'); // 用户管理按钮（可选）

    let currentUserRole = null;      // 当前登录用户角色
    let currentPost = null;          // 当前编辑的文章 { slug, is_published }

    // ==================== 工具函数：显示消息 ====================
    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        messageDiv.style.display = 'block';
        setTimeout(() => {
            messageDiv.style.display = 'none';
        }, 3000);
    }

    // ==================== 加载当前用户信息 ====================
    async function loadCurrentUser() {
        try {
            const res = await fetch('/api/user/me');
            if (!res.ok) throw new Error('获取用户失败');
            const user = await res.json();
            if (user.username) {
                usernameSpan.textContent = user.username;
                currentUserRole = user.role;

                // 控制用户管理按钮（仅admin可见）
                if (userManagementBtn) {
                    userManagementBtn.style.display = user.role === 'admin' ? 'inline-block' : 'none';
                }

                // 根据角色控制右侧按钮组
                if (user.role === 'superadmin') {
                    // superadmin 只保留保存按钮
                    if (newPostBtn) newPostBtn.style.display = 'none';
                    if (uploadMdLabel) uploadMdLabel.style.display = 'none'; // 隐藏上传标签
                    if (uploadMd) uploadMd.style.display = 'none';           // 隐藏文件输入
                    if (publishBtn) publishBtn.style.display = 'none';
                    // 保存按钮占满宽度
                    if (saveDraftBtn) {
                        saveDraftBtn.style.width = '100%';
                        saveDraftBtn.style.display = ''; // 确保显示
                    }
                } else {
                    // 其他角色显示所有按钮
                    if (newPostBtn) newPostBtn.style.display = '';
                    if (uploadMdLabel) uploadMdLabel.style.display = ''; // 显示上传标签
                    if (uploadMd) uploadMd.style.display = 'none';       // 隐藏文件输入（始终隐藏）
                    if (publishBtn) publishBtn.style.display = '';
                    if (saveDraftBtn) saveDraftBtn.style.width = '';     // 恢复默认宽度
}
            } else {
                usernameSpan.textContent = '访客';
            }
        } catch (err) {
            console.error('获取用户信息失败:', err);
            usernameSpan.textContent = '未知';
        }
    }

    // ==================== 加载文章列表 ====================
    async function loadPosts() {
        try {
            const response = await fetch('/api/admin/posts');
            if (!response.ok) throw new Error('加载失败');
            const posts = await response.json();

            // 清空容器
            publishedContainer.innerHTML = '';
            draftContainer.innerHTML = '';

            if (posts.length === 0) {
                publishedContainer.innerHTML = '<p style="text-align:center;">暂无文章</p>';
                return;
            }

            posts.forEach(post => {
                // 根据当前用户角色决定显示作者还是slug
                const displayInfo = (currentUserRole === 'superadmin')
                    ? `<span class="slug">作者: ${post.author || '未知'}</span>`
                    : `<span class="slug">(${post.slug})</span>`;

                const html = `
                    <div class="post-item" data-slug="${post.slug}" data-published="${post.is_published}">
                        <div style="flex: 1;" onclick="editPost('${post.slug}')">
                            <span class="title">${post.title}</span>
                            ${displayInfo}
                        </div>
                        <div class="post-actions">
                            <button class="btn" onclick="editPost('${post.slug}')">编辑</button>
                            <button class="btn btn-danger" onclick="deletePost('${post.slug}')">删除</button>
                        </div>
                    </div>
                `;

                if (post.is_published == 1) {
                    publishedContainer.innerHTML += html;
                } else {
                    draftContainer.innerHTML += html;
                }
            });
        } catch (error) {
            console.error(error);
            publishedContainer.innerHTML = '<p style="color: red;">加载失败</p>';
        }
    }

    // ==================== 编辑文章 ====================
    window.editPost = async function(slug) {
        try {
            const response = await fetch(`/api/post/${slug}`);
            if (!response.ok) throw new Error('加载失败');
            const post = await response.json();

            // 填充表单
            slugHidden.value = post.slug;
            if (slugDisplay) slugDisplay.value = post.slug;
            titleInput.value = post.title;
            contentInput.value = post.content || '';
            excerptInput.value = post.excerpt || '';
            tagsInput.value = post.tags || '';

            // 记录当前文章状态
            currentPost = { slug: post.slug, is_published: post.is_published };

            // 控制发表按钮（已发表文章禁用发表）
            if (publishBtn) {
                if (post.is_published) {
                    publishBtn.disabled = true;
                    publishBtn.style.opacity = 0.5;
                    publishBtn.title = '文章已发表，无需再次发表';
                } else {
                    publishBtn.disabled = false;
                    publishBtn.style.opacity = 1;
                    publishBtn.title = '发表此草稿';
                }
            }
            showMessage('已加载文章', 'success');
        } catch (error) {
            showMessage('加载失败', 'error');
        }
    };

    // ==================== 删除文章 ====================
    window.deletePost = async function(slug) {
        if (!confirm(`确定要删除文章 "${slug}" 吗？`)) return;

        const formData = new FormData();
        formData.append('slug', slug);

        try {
            const response = await fetch('/api/admin/post/delete', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                showMessage('删除成功', 'success');
                loadPosts();
                if (slugHidden.value === slug) {
                    clearForm(); // 如果删除的是当前编辑的文章，清空表单
                }
            } else {
                showMessage(result.error || '删除失败', 'error');
            }
        } catch (error) {
            showMessage('删除失败', 'error');
        }
    };

    // ==================== 清空表单 ====================
    function clearForm() {
        slugHidden.value = '';
        if (slugDisplay) slugDisplay.value = '';
        titleInput.value = '';
        contentInput.value = '';
        excerptInput.value = '';
        tagsInput.value = '';
        currentPost = null;

        // 恢复发表按钮状态
        if (publishBtn) {
            publishBtn.disabled = false;
            publishBtn.style.opacity = 1;
            publishBtn.title = '发表此草稿';
        }
    }

    // ==================== 新建按钮 ====================
    newPostBtn.addEventListener('click', () => {
        if (confirm('新建文章将清空当前表单，确定吗？')) {
            clearForm();
        }
    });

    // ==================== 上传MD文件 ====================
    uploadMd.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const allowedExts = ['.md', '.markdown'];
        const fileName = file.name;
        const ext = fileName.substring(fileName.lastIndexOf('.')).toLowerCase();
        if (!allowedExts.includes(ext) && file.type !== 'text/markdown') {
            alert('只支持上传 .md 或 .markdown 文件');
            e.target.value = '';
            return;
        }

        const maxSize = 1 * 1024 * 1024;
        if (file.size > maxSize) {
            alert('文件大小不能超过 1MB');
            e.target.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
            contentInput.value = event.target.result;
            showMessage('文件已加载到正文', 'success');
        };
        reader.onerror = () => alert('文件读取失败');
        reader.readAsText(file, 'UTF-8');
        e.target.value = ''; // 允许再次上传同一文件
    });

    // ==================== 保存草稿 ====================
    saveDraftBtn.addEventListener('click', async () => {
        const formData = new FormData(form);
        saveDraftBtn.disabled = true;
        saveDraftBtn.textContent = '保存中...';

        try {
            const response = await fetch('/api/admin/post', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                showMessage('草稿保存成功', 'success');
                if (result.slug) {
                    slugHidden.value = result.slug;
                    if (slugDisplay) slugDisplay.value = result.slug;
                    currentPost = {
                        slug: result.slug,
                        is_published: currentPost ? currentPost.is_published : false
                    };
                }
                await loadPosts();
            } else {
                showMessage(result.error || '保存失败', 'error');
            }
        } catch (error) {
            showMessage('保存失败，请稍后重试', 'error');
        } finally {
            saveDraftBtn.disabled = false;
            saveDraftBtn.textContent = '保存';
        }
    });

    // ==================== 发表文章 ====================
    publishBtn.addEventListener('click', async () => {
        if (!currentPost) {
            showMessage('请先选择或创建一篇文章', 'error');
            return;
        }
        if (currentPost.is_published) {
            showMessage('文章已发表，无需重复操作', 'error');
            return;
        }
        if (!confirm('确定要发表这篇文章吗？发表后将生成正式链接并出现在首页。')) return;

        publishBtn.disabled = true;
        publishBtn.textContent = '发表中...';

        try {
            const response = await fetch('/api/admin/post/publish', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slug: currentPost.slug })
            });
            const result = await response.json();

            if (result.success) {
                showMessage('文章发表成功', 'success');
                // 更新当前文章信息
                currentPost.slug = result.newSlug;
                currentPost.is_published = true;
                slugHidden.value = result.newSlug;
                if (slugDisplay) slugDisplay.value = result.newSlug;
                // 发表按钮保持禁用
                publishBtn.disabled = true;
                publishBtn.style.opacity = 0.5;
                publishBtn.title = '文章已发表';
                await loadPosts();
            } else {
                showMessage(result.error || '发表失败', 'error');
                publishBtn.disabled = false;
            }
        } catch (error) {
            showMessage('发表失败，请稍后重试', 'error');
            publishBtn.disabled = false;
        } finally {
            publishBtn.textContent = '发表';
        }
    });

    // ==================== 注销按钮 ====================
    logoutBtn.addEventListener('click', async () => {
        if (confirm('确定要注销吗？')) {
            try {
                const response = await fetch('/api/logout', {
                    method: 'POST',
                    credentials: 'same-origin'
                });
                if (response.ok) {
                    window.location.replace('/admin/login.html');
                } else {
                    alert('注销失败');
                }
            } catch (error) {
                alert('注销出错');
            }
        }
    });

    // ==================== 初始加载 ====================
    loadCurrentUser();
    loadPosts();
</script>
</body>
</html>
