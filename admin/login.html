<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #ffe9f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            width: 300px;
            border: 1px solid #FB7299;
            margin-top: 1rem;
        }

        h2 {
            color: #FB7299;
            text-align: center;
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            box-sizing: border-box;
            border: 1px solid #FB7299;
            border-radius: 12px;
        }

        button {
            width: 100%;
            padding: 0.8rem;
            background: #FB7299;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- 返回主页按钮 -->
    <a href="../index.html"
        style="text-decoration: none; display: flex; align-items: center; gap: 8px; font-size: 1.4rem; font-weight: 700; color: #FB7299; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(251, 114, 153, 0.3); transition: all 0.3s; box-shadow: 0 4px 12px rgba(251, 114, 153, 0.1);">
        <i class="fab fa-bilibili" style="font-size: 1.6rem;"></i>
        <span>小电视の日常</span>
    </a>
    <div class="login-box">
        <h2>管理员登录</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="用户名" required>
            <input type="password" id="password" placeholder="密码" required>
            <button type="submit">登录</button>
            <p class="error" id="errorMsg"></p>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.replace('/admin.html');
                } else {
                    errorMsg.textContent = data.error || '登录失败';
                }
            } catch (err) {
                errorMsg.textContent = '网络错误，请重试';
            }
        });
    </script>
</body>

</html>
