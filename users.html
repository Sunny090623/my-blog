<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 · 小电视の日常</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #ffe9f0, #ffd9e5);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.03), 0 4px 12px rgba(251, 114, 153, 0.1);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .users-container {
            max-width: 1300px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }

        .panel {
            padding: 2rem;
        }

        h2 {
            color: #FB7299;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #FB7299;
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-list {
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem;
            border-bottom: 1px solid rgba(251, 114, 153, 0.2);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 20px;
            margin-bottom: 0.3rem;
        }

        .user-item:hover {
            background: rgba(251, 114, 153, 0.1);
        }

        .user-item.selected {
            background: rgba(251, 114, 153, 0.2);
            border: 1px solid #FB7299;
            box-shadow: 0 4px 10px rgba(251, 114, 153, 0.2);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.1rem;
        }

        .user-info i {
            color: #FB7299;
            font-size: 1.4rem;
            width: 24px;
        }

        .user-date {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2a2a2a;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid rgba(251, 114, 153, 0.3);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #FB7299;
            box-shadow: 0 0 0 3px rgba(251, 114, 153, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(251, 114, 153, 0.3);
            color: #2a2a2a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex: 1;
        }

        .btn:hover {
            background: #FB7299;
            color: white;
            border-color: #FB7299;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(251, 114, 153, 0.3);
        }

        .btn-danger {
            background: rgba(255, 100, 100, 0.15);
            border-color: #ff7d7d;
            color: #b30000;
        }

        .btn-danger:hover {
            background: #ff4d4d;
            color: white;
            border-color: #ff4d4d;
        }

        .message {
            margin-top: 1.5rem;
            padding: 0.8rem 1.2rem;
            border-radius: 30px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background: rgba(0, 200, 0, 0.15);
            border: 1px solid #2ecc71;
            color: #27ae60;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff7d7d;
            color: #c0392b;
        }

        .refresh-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 0.8rem;
            background: rgba(251, 114, 153, 0.1);
            border: 1px dashed #FB7299;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            color: #FB7299;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            background: rgba(251, 114, 153, 0.2);
            border-style: solid;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .users-container {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <!-- 返回主页按钮 -->
    <div
        style="max-width: 1400px; margin: 0 auto 1.5rem auto; display: flex; justify-content: center; align-items: center;">
        <a href="./index.html"
            style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.4rem; font-weight: 700; color: #FB7299; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px); padding: 8px 32px; border-radius: 20px; border: 1px solid rgba(251, 114, 153, 0.3); transition: all 0.3s; box-shadow: 0 4px 12px rgba(251, 114, 153, 0.1);">
            <i class="fab fa-bilibili" style="font-size: 1.6rem;"></i>
            <span>小电视の日常</span>
        </a>
    </div>
    <div class="users-container">
        <!-- 左侧：用户列表卡片 -->
        <div class="panel glass">
            <h2><i class="fas fa-users"></i> 用户列表</h2>
            <div class="user-list" id="user-list">
                <!-- 动态加载 -->
            </div>
            <button class="refresh-btn" id="refreshUsersBtn">
                <i class="fas fa-sync-alt"></i> 刷新列表
            </button>
        </div>

        <!-- 右侧：操作卡片 -->
        <div class="panel glass">
            <h2><i class="fas fa-user-edit"></i> 用户操作</h2>
            <form id="userForm">
                <div class="form-group">
                    <label><i class="fas fa-user" style="color:#FB7299; margin-right:0.3rem;"></i> 用户名</label>
                    <input type="text" id="username" placeholder="输入用户名" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock" style="color:#FB7299; margin-right:0.3rem;"></i> 密码</label>
                    <input type="password" id="password" placeholder="修改密码时填写新密码">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-circle" style="color:#FB7299; margin-right:0.3rem;"></i> 确认密码</label>
                    <input type="password" id="confirmPassword" placeholder="再次输入密码">
                </div>
                <div class="btn-group">
                    <button type="button" id="updateUserBtn" class="btn"><i class="fas fa-key"></i> 修改密码</button>
                    <button type="button" id="deleteUserBtn" class="btn btn-danger"><i class="fas fa-trash"></i>
                        删除</button>
                </div>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>

    <script>
        // DOM 元素
        const userListDiv = document.getElementById('user-list');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const updateBtn = document.getElementById('updateUserBtn');
        const deleteBtn = document.getElementById('deleteUserBtn');
        const refreshBtn = document.getElementById('refreshUsersBtn');
        const messageDiv = document.getElementById('message');

        let selectedUserId = null;

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        // 加载用户列表
        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                if (!res.ok) throw new Error('加载失败');
                const users = await res.json();
                let html = '';
                users.forEach(user => {
                    const selectedClass = selectedUserId === user.id ? 'selected' : '';
                    const date = new Date(user.created_at).toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-');
                    html += `
                        <div class="user-item ${selectedClass}" data-id="${user.id}" data-username="${user.username}">
                            <div class="user-info">
                                <i class="fas fa-user-circle"></i>
                                <span>${user.username}</span>
                            </div>
                            <div class="user-date">${date}</div>
                        </div>
                    `;
                });
                userListDiv.innerHTML = html || '<p style="text-align:center; padding:2rem; color:#666;">暂无用户</p>';

                // 为每个用户项添加点击事件
                document.querySelectorAll('.user-item').forEach(item => {
                    item.addEventListener('click', () => {
                        document.querySelectorAll('.user-item').forEach(i => i.classList.remove('selected'));
                        item.classList.add('selected');
                        selectedUserId = item.dataset.id;
                        usernameInput.value = item.dataset.username;
                        passwordInput.value = '';
                        confirmInput.value = '';
                    });
                });
            } catch (err) {
                userListDiv.innerHTML = '<p style="color:red; text-align:center;">加载失败</p>';
            }
        }

        // 清空表单
        function clearForm() {
            selectedUserId = null;
            usernameInput.value = '';
            passwordInput.value = '';
            confirmInput.value = '';
            document.querySelectorAll('.user-item').forEach(i => i.classList.remove('selected'));
        }


        // 修改密码
        updateBtn.addEventListener('click', async () => {
            if (!selectedUserId) {
                showMessage('请先选择一个用户', 'error');
                return;
            }
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            if (!password) {
                showMessage('密码不能为空', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage('两次密码不一致', 'error');
                return;
            }

            try {
                const res = await fetch('/api/admin/user/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: selectedUserId, password })
                });
                const result = await res.json();
                if (res.ok) {
                    showMessage('密码修改成功', 'success');
                    passwordInput.value = '';
                    confirmInput.value = '';
                } else {
                    showMessage(result.error || '修改失败', 'error');
                }
            } catch (err) {
                showMessage('请求失败', 'error');
            }
        });

        // 删除用户
        deleteBtn.addEventListener('click', async () => {
            if (!selectedUserId) {
                showMessage('请先选择一个用户', 'error');
                return;
            }
            if (!confirm('确定要删除该用户吗？此操作不可撤销。')) return;

            try {
                const res = await fetch('/api/admin/user/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: selectedUserId })
                });
                const result = await res.json();
                if (res.ok) {
                    showMessage('用户删除成功', 'success');
                    clearForm();
                    loadUsers();
                } else {
                    showMessage(result.error || '删除失败', 'error');
                }
            } catch (err) {
                showMessage('请求失败', 'error');
            }
        });

        refreshBtn.addEventListener('click', loadUsers);

        // 初始加载
        loadUsers();
    </script>
</body>

</html>
