<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 · 小电视の日常</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .users-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 2rem;
        }
        .user-list-panel {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(251,114,153,0.3);
        }
        .user-edit-panel {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(251,114,153,0.3);
        }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid rgba(251,114,153,0.2);
            cursor: pointer;
            transition: background 0.2s;
        }
        .user-item:hover {
            background: rgba(251,114,153,0.1);
        }
        .user-item.selected {
            background: rgba(251,114,153,0.2);
            border-left: 4px solid #FB7299;
        }
        .btn-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .btn-group .btn {
            flex: 1;
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: rgba(0,200,0,0.2);
            border: 1px solid #00a800;
            color: #006400;
        }
        .message.error {
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff0000;
            color: #a80000;
        }
        @media (max-width: 768px) {
            .users-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="users-container">
        <!-- 左侧：用户列表 -->
        <div class="user-list-panel">
            <h2 style="color:#FB7299;"><i class="fas fa-users"></i> 用户列表</h2>
            <div id="user-list" class="post-list" style="max-height: 500px; overflow-y: auto;">
                <!-- 动态加载 -->
            </div>
            <div style="margin-top: 2rem;">
                <button id="refreshUsersBtn" class="btn" style="width:100%;"><i class="fas fa-sync-alt"></i> 刷新</button>
            </div>
        </div>

        <!-- 右侧：编辑表单 -->
        <div class="user-edit-panel">
            <h2 style="color:#FB7299;"><i class="fas fa-user-edit"></i> 用户操作</h2>
            <form id="userForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="修改密码时填写新密码">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="confirmPassword" placeholder="再次输入密码">
                </div>
                <div class="btn-group">
                    <button type="button" id="addUserBtn" class="btn"><i class="fas fa-plus"></i> 新增</button>
                    <button type="button" id="updateUserBtn" class="btn"><i class="fas fa-key"></i> 修改密码</button>
                    <button type="button" id="deleteUserBtn" class="btn btn-danger"><i class="fas fa-trash"></i> 删除</button>
                </div>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>

    <script>
        // DOM 元素
        const userListDiv = document.getElementById('user-list');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const addBtn = document.getElementById('addUserBtn');
        const updateBtn = document.getElementById('updateUserBtn');
        const deleteBtn = document.getElementById('deleteUserBtn');
        const refreshBtn = document.getElementById('refreshUsersBtn');
        const messageDiv = document.getElementById('message');

        let selectedUserId = null;

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                if (!res.ok) throw new Error('加载失败');
                const users = await res.json();
                let html = '';
                users.forEach(user => {
                    const selectedClass = selectedUserId === user.id ? 'selected' : '';
                    html += `
                        <div class="user-item ${selectedClass}" data-id="${user.id}" data-username="${user.username}">
                            <span><i class="fas fa-user"></i> ${user.username}</span>
                            <small>${new Date(user.created_at).toLocaleDateString()}</small>
                        </div>
                    `;
                });
                userListDiv.innerHTML = html || '<p style="text-align:center;">暂无用户</p>';

                // 为每个用户项添加点击事件
                document.querySelectorAll('.user-item').forEach(item => {
                    item.addEventListener('click', () => {
                        document.querySelectorAll('.user-item').forEach(i => i.classList.remove('selected'));
                        item.classList.add('selected');
                        selectedUserId = item.dataset.id;
                        usernameInput.value = item.dataset.username;
                        passwordInput.value = '';
                        confirmInput.value = '';
                    });
                });
            } catch (err) {
                userListDiv.innerHTML = '<p style="color:red;">加载失败</p>';
            }
        }

        // 清空表单
        function clearForm() {
            selectedUserId = null;
            usernameInput.value = '';
            passwordInput.value = '';
            confirmInput.value = '';
            document.querySelectorAll('.user-item').forEach(i => i.classList.remove('selected'));
        }

        // 新增用户
        addBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            if (!username || !password) {
                showMessage('用户名和密码不能为空', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage('两次密码不一致', 'error');
                return;
            }

            try {
                const res = await fetch('/api/admin/user/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await res.json();
                if (res.ok) {
                    showMessage('用户添加成功', 'success');
                    clearForm();
                    loadUsers();
                } else {
                    showMessage(result.error || '添加失败', 'error');
                }
            } catch (err) {
                showMessage('请求失败', 'error');
            }
        });

        // 修改密码
        updateBtn.addEventListener('click', async () => {
            if (!selectedUserId) {
                showMessage('请先选择一个用户', 'error');
                return;
            }
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            if (!password) {
                showMessage('密码不能为空', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage('两次密码不一致', 'error');
                return;
            }

            try {
                const res = await fetch('/api/admin/user/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: selectedUserId, password })
                });
                const result = await res.json();
                if (res.ok) {
                    showMessage('密码修改成功', 'success');
                    passwordInput.value = '';
                    confirmInput.value = '';
                } else {
                    showMessage(result.error || '修改失败', 'error');
                }
            } catch (err) {
                showMessage('请求失败', 'error');
            }
        });

        // 删除用户
        deleteBtn.addEventListener('click', async () => {
            if (!selectedUserId) {
                showMessage('请先选择一个用户', 'error');
                return;
            }
            if (!confirm('确定要删除该用户吗？此操作不可撤销。')) return;

            try {
                const res = await fetch('/api/admin/user/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: selectedUserId })
                });
                const result = await res.json();
                if (res.ok) {
                    showMessage('用户删除成功', 'success');
                    clearForm();
                    loadUsers();
                } else {
                    showMessage(result.error || '删除失败', 'error');
                }
            } catch (err) {
                showMessage('请求失败', 'error');
            }
        });

        refreshBtn.addEventListener('click', loadUsers);

        // 初始加载
        loadUsers();
    </script>
</body>
</html>
